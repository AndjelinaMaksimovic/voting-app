apiVersion: apps/v1
kind: Deployment
metadata:
  name: voting-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voting-app
  template:
    metadata:
      labels:
        app: voting-app
    spec:
      containers:
        - name: voting-app
          image: voting-app
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: VOTING_API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voting-app-secrets
                  key: api-password
                  optional: true
